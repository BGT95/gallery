name: webant_gallery
description: "WebAnt Gallery - photo gallery app with Clean Architecture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Network
  dio: ^5.7.0

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3

  # Image Caching
  cached_network_image: ^3.4.1

  # Connectivity
  connectivity_plus: ^6.1.4

  # Local Storage / Caching
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Functional programming helpers
  dartz: ^0.10.1

  # Navigation
  go_router: ^14.8.1

  # UI
  flutter_svg: ^2.2.3

  

dev_dependencies:  
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code gen
  build_runner: ^2.11.1
  flutter_gen_runner:

flutter_gen:
  output: lib/gen/ # Optional (default: lib/gen/)
  line_length: 80 # Optional (default: 80)

  # Optional
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/forms/
    - assets/icons/navigation/
